name: Weekly Keyword Feedback Loop (GSC)

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday 7am UTC
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write

jobs:
  keyword-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run GSC keyword analysis + generate content
        env:
          GSC_SERVICE_ACCOUNT: ${{ secrets.GSC_SERVICE_ACCOUNT }}
        run: node .github/scripts/gsc-keyword-feedback.js

      - name: Commit and push new pages
        run: |
          git config user.name "VulnScan GSC Bot"
          git config user.email "bot@vulnscan.tech"
          git add -A
          git diff --staged --quiet || git commit -m "Auto: keyword-optimized pages from GSC [$(date +%Y-%m-%d)]"
          git push
