name: Auto-Index New Pages
on:
  push:
    branches: [master]
    paths:
      - '**.html'
      - 'sitemap.xml'

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find new/changed HTML files
        id: changed
        run: |
          # Get list of changed HTML files
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- '*.html' 'sitemap.xml' | head -50)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Build URL list
          URLS=""
          for f in $CHANGED; do
            slug="${f%.html}"
            if [ "$slug" != "404" ] && [ "$slug" != "index" ]; then
              URLS="$URLS\"https://vulnscan.tech/$slug\","
            fi
          done
          # Add index
          if echo "$CHANGED" | grep -q "index.html"; then
            URLS="$URLS\"https://vulnscan.tech/\","
          fi
          echo "urls=[$URLS]" >> $GITHUB_OUTPUT
          echo "Found changed files: $CHANGED"

      - name: Submit to IndexNow (Bing + Yandex + Google)
        if: steps.changed.outputs.files != ''
        run: |
          # Build URL array from changed files
          URLS='[]'
          URL_LIST=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            slug="${f%.html}"
            [ "$slug" = "404" ] && continue
            if [ "$slug" = "index" ]; then
              URL_LIST="$URL_LIST\"https://vulnscan.tech/\","
            else
              URL_LIST="$URL_LIST\"https://vulnscan.tech/$slug\","
            fi
          done <<< "${{ steps.changed.outputs.files }}"
          
          # Remove trailing comma
          URL_LIST="${URL_LIST%,}"
          
          BODY="{\"host\":\"vulnscan.tech\",\"key\":\"vulnscan-indexnow-key-2026\",\"keyLocation\":\"https://vulnscan.tech/vulnscan-indexnow-key-2026.txt\",\"urlList\":[$URL_LIST]}"
          
          echo "Submitting to IndexNow:"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          
          # Submit to all IndexNow endpoints
          for endpoint in "https://api.indexnow.org/indexnow" "https://www.bing.com/indexnow" "https://yandex.com/indexnow"; do
            echo "→ $endpoint"
            curl -s -o /dev/null -w "  Status: %{http_code}\n" \
              -X POST "$endpoint" \
              -H "Content-Type: application/json" \
              -d "$BODY" || true
          done

      - name: Submit sitemap to Google
        if: steps.changed.outputs.files != ''
        run: |
          # Ping Google with updated sitemap
          curl -s "https://www.google.com/ping?sitemap=https://vulnscan.tech/sitemap.xml"
          echo "Google sitemap ping sent"

      - name: Submit to Google Indexing API
        if: steps.changed.outputs.files != ''
        env:
          GSC_SERVICE_ACCOUNT: ${{ secrets.GSC_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$GSC_SERVICE_ACCOUNT" ]; then
            echo "No GSC_SERVICE_ACCOUNT secret set, skipping Google Indexing API"
            exit 0
          fi
          
          echo "$GSC_SERVICE_ACCOUNT" > /tmp/gsc-key.json
          
          python3 << 'PYEOF'
          import json, time, urllib.request, ssl
          
          # Read service account
          with open('/tmp/gsc-key.json') as f:
              sa = json.load(f)
          
          # Build JWT for Google API auth
          import base64, hashlib, hmac
          from datetime import datetime
          
          header = base64.urlsafe_b64encode(json.dumps({"alg":"RS256","typ":"JWT"}).encode()).rstrip(b'=')
          now = int(time.time())
          payload = base64.urlsafe_b64encode(json.dumps({
              "iss": sa["client_email"],
              "scope": "https://www.googleapis.com/auth/indexing",
              "aud": "https://oauth2.googleapis.com/token",
              "iat": now,
              "exp": now + 3600
          }).encode()).rstrip(b'=')
          
          # Sign with private key
          try:
              from cryptography.hazmat.primitives import hashes, serialization
              from cryptography.hazmat.primitives.asymmetric import padding
              
              private_key = serialization.load_pem_private_key(sa["private_key"].encode(), password=None)
              signature = private_key.sign(header + b"." + payload, padding.PKCS1v15(), hashes.SHA256())
              sig_b64 = base64.urlsafe_b64encode(signature).rstrip(b'=')
              jwt_token = (header + b"." + payload + b"." + sig_b64).decode()
              
              # Exchange JWT for access token
              token_data = urllib.parse.urlencode({
                  "grant_type": "urn:ietf:params:oauth:grant-type:jwt-bearer",
                  "assertion": jwt_token
              }).encode()
              
              req = urllib.request.Request("https://oauth2.googleapis.com/token", data=token_data)
              resp = json.loads(urllib.request.urlopen(req).read())
              access_token = resp["access_token"]
              
              print(f"Got Google access token")
              
              # Read changed files and submit each URL
              import subprocess
              result = subprocess.run(['git', 'diff', '--name-only', 'HEAD~1', 'HEAD', '--', '*.html'], 
                                     capture_output=True, text=True)
              
              for f in result.stdout.strip().split('\n'):
                  if not f or f == '404.html':
                      continue
                  slug = f.replace('.html', '')
                  url = f"https://vulnscan.tech/{slug}" if slug != "index" else "https://vulnscan.tech/"
                  
                  body = json.dumps({"url": url, "type": "URL_UPDATED"}).encode()
                  req = urllib.request.Request(
                      "https://indexing.googleapis.com/v3/urlNotifications:publish",
                      data=body,
                      headers={
                          "Authorization": f"Bearer {access_token}",
                          "Content-Type": "application/json"
                      }
                  )
                  try:
                      resp = urllib.request.urlopen(req)
                      print(f"✅ Submitted: {url}")
                  except Exception as e:
                      print(f"⚠️ {url}: {e}")
                  time.sleep(0.5)
                  
          except ImportError:
              print("cryptography not installed, installing...")
              import subprocess
              subprocess.run(["pip", "install", "cryptography"], check=True)
              print("Installed. Will work on next push.")
          except Exception as e:
              print(f"Google Indexing API error: {e}")
          PYEOF
          
          rm -f /tmp/gsc-key.json
